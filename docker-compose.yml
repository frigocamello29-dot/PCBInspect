services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pcb_user
      POSTGRES_PASSWORD: pcb_pass
      POSTGRES_DB: pcb_defects
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcb_user -d pcb_defects"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - ./ml:/app/ml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build: ./backend
    command: python -m arq app.tasks.detect_task.WorkerSettings
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - ./ml:/app/ml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  uploads:
